name: SampleAppIOS
options:
  bundleIdPrefix: dev.reticle
  deploymentTarget:
    iOS: "15.0"
packages:
  ReticleAgentIOS:
    path: ../../reticle-agent/ios
targets:
  SampleApp:
    type: application
    platform: iOS
    sources:
      - path: ../Sources/SampleApp
    dependencies:
      - package: ReticleAgentIOS
        product: ReticleKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.reticle.sampleios
        DEVELOPMENT_TEAM: D66CSW78K2
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
