name: Release

# Build the host CLI distribution and the agent AAR, then attach them to a
# GitHub Release so users can install Reticle without a local JDK/Gradle build.
#
# Trigger: push a semver tag (e.g. `v0.1.0`). The CLI's launcher (bin/reticle)
# prefers these prebuilt artifacts and only falls back to building from source.
on:
  push:
    tags:
      - "v*"
  # Allow building artifacts on demand without cutting a release.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build & publish artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build CLI distribution (zip + tar)
        run: ./gradlew :reticle-cli:distZip :reticle-cli:distTar --stacktrace

      - name: Build agent AAR
        run: ./gradlew :reticle-agent:android:assembleRelease --stacktrace

      - name: Build injectable payload dex
        # Needed by `reticle app inject`. The CLI looks for it under <install>/lib,
        # so it must be repacked into the CLI distribution archives below.
        run: ./gradlew :reticle-agent:android:dexPayload --stacktrace

      - name: Stage artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          PAYLOAD=reticle-agent/android/build/reticle-payload/reticle-agent-payload.jar
          test -f "$PAYLOAD" || { echo "payload dex missing: $PAYLOAD"; exit 1; }

          # Repack the payload dex into the CLI archives under reticle/lib/ — the
          # path Injector.locatePayloadDex() resolves from a release install.
          # (gradle's distZip/distTar are already built; inject the extra file.)
          work="$(mktemp -d)"
          unzip -q reticle-cli/build/distributions/reticle.zip -d "$work"
          cp "$PAYLOAD" "$work/reticle/lib/reticle-agent-payload.jar"
          ( cd "$work" && zip -q -r "$OLDPWD/dist/reticle-cli.zip" reticle )
          tar -C "$work" -cf dist/reticle-cli.tar reticle
          rm -rf "$work"

          # Agent AAR for linking into a host app build, and the bare dex for
          # advanced users who set RETICLE_PAYLOAD_DEX explicitly.
          cp reticle-agent/android/build/outputs/aar/reticle-agent-android-release.aar dist/reticle-agent-android.aar
          cp "$PAYLOAD" dist/reticle-agent-payload.jar
          # Checksums so the launcher / users can verify a download.
          ( cd dist && sha256sum * > SHA256SUMS )
          ls -l dist

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v6
        with:
          name: reticle-dist
          path: dist/

      - name: Publish GitHub Release
        # Only attach to a Release when triggered by a tag push.
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/reticle-cli.zip
            dist/reticle-cli.tar
            dist/reticle-agent-android.aar
            dist/reticle-agent-payload.jar
            dist/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true
