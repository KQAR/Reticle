name: Release

# Build the no-JDK macOS arm64 distribution (Swift host + native helper) plus the
# agent AAR, and attach them to a GitHub Release so users install Reticle with no
# JDK/Gradle/Swift toolchain. The launcher (bin/reticle) downloads and runs these.
#
# Trigger: push a semver tag (e.g. `v0.1.0`). macOS arm64 is the only target.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build & publish artifacts (macOS arm64)
    # arm64 macOS runner — native-image and Swift are per-OS; this is the sole target.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      # Hummingbird 2.25.0 requires Swift tools 6.1; macOS 15 includes Xcode 16.4.
      - name: Select Xcode 16.4 (Swift 6.1)
        run: |
          set -euo pipefail
          xc="/Applications/Xcode_16.4.app"
          [ -d "$xc" ] || { echo "Xcode 16.4 not found on runner"; ls -d /Applications/Xcode*.app; exit 1; }
          echo "selecting $xc"
          sudo xcode-select -s "$xc"
          swift --version

      - name: Set up GraalVM (JDK 21, native-image)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: "21"
          distribution: graalvm
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: reticle-host/.build
          key: swiftpm-${{ runner.os }}-xcode16.4-${{ hashFiles('reticle-host/Package.resolved') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-xcode16.4-

      # Gate the release on the same checks CI runs on main: nothing forces a
      # tag to sit on a green commit, and an unvalidated tag previously
      # published broken artifacts (including version skew validate_plugin.py
      # exists to catch).
      - name: "Gate: JVM unit tests"
        run: ./gradlew :reticle-core:test :reticle-helper:test --stacktrace

      - name: "Gate: Swift host tests"
        # Retry the executor-flaky Hummingbird serve tests (see ci.yml).
        run: |
          set -uo pipefail
          for attempt in 1 2 3; do
            echo "::group::swift test (attempt $attempt)"
            if swift test --no-parallel --package-path reticle-host; then echo "::endgroup::"; exit 0; fi
            echo "::endgroup::"
            echo "swift test attempt $attempt failed"
          done
          exit 1

      - name: "Gate: plugin manifests + version lockstep"
        run: python3 scripts/validate_plugin.py

      - name: Build the native helper (no-JDK reticle-helper)
        run: ./gradlew :reticle-helper:nativeHelper --stacktrace

      - name: Build the Swift host
        run: swift build -c release --package-path reticle-host

      - name: Build agent AAR + payload dex
        run: ./gradlew :reticle-agent:android:assembleRelease :reticle-agent:android:dexPayload --stacktrace

      - name: Stage artifacts
        run: |
          set -euo pipefail
          mkdir -p dist

          HELPER=reticle-helper/build/native/reticle-helper
          HOST=reticle-host/.build/release/ReticleHost
          PAYLOAD=reticle-agent/android/build/reticle-payload/reticle-agent-payload.jar
          test -x "$HELPER" || { echo "native helper missing: $HELPER"; exit 1; }
          test -x "$HOST"   || { echo "swift host missing: $HOST"; exit 1; }
          test -f "$PAYLOAD" || { echo "payload dex missing: $PAYLOAD"; exit 1; }

          # Lay out the dist the launcher expects: <root>/reticle/bin/{reticle-host,reticle-helper}.
          # The native helper resolves its payload dex from <install>/lib, so place it there too.
          work="$(mktemp -d)"
          mkdir -p "$work/reticle/bin" "$work/reticle/lib"
          cp "$HOST"   "$work/reticle/bin/reticle-host"
          cp "$HELPER" "$work/reticle/bin/reticle-helper"
          cp "$PAYLOAD" "$work/reticle/lib/reticle-agent-payload.jar"
          chmod +x "$work/reticle/bin/"*
          ( cd "$work" && zip -q -r "$OLDPWD/dist/reticle-macos-arm64.zip" reticle )
          rm -rf "$work"

          # Agent AAR for linking into a host app build, and the bare dex for
          # advanced users who set RETICLE_PAYLOAD_DEX explicitly.
          cp reticle-agent/android/build/outputs/aar/reticle-agent-android-release.aar dist/reticle-agent-android.aar
          cp "$PAYLOAD" dist/reticle-agent-payload.jar
          ( cd dist && shasum -a 256 * > SHA256SUMS )
          ls -l dist

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v6
        with:
          name: reticle-dist
          path: dist/

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/reticle-macos-arm64.zip
            dist/reticle-agent-android.aar
            dist/reticle-agent-payload.jar
            dist/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true
