name: Release

# Build the host CLI distribution and the agent AAR, then attach them to a
# GitHub Release so users can install Reticle without a local JDK/Gradle build.
#
# Trigger: push a semver tag (e.g. `v0.1.0`). The CLI's launcher (bin/reticle)
# prefers these prebuilt artifacts and only falls back to building from source.
on:
  push:
    tags:
      - "v*"
  # Allow building artifacts on demand without cutting a release.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build & publish artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build CLI distribution (zip + tar)
        run: ./gradlew :reticle-cli:distZip :reticle-cli:distTar --stacktrace

      - name: Build agent AAR
        run: ./gradlew :reticle-agent:assembleRelease --stacktrace

      - name: Stage artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          # The application plugin names these reticle.zip / reticle.tar.
          cp reticle-cli/build/distributions/reticle.zip dist/reticle-cli.zip
          cp reticle-cli/build/distributions/reticle.tar dist/reticle-cli.tar
          # Agent AAR for linking into a host app build.
          cp reticle-agent/build/outputs/aar/reticle-agent-release.aar dist/reticle-agent.aar
          # Checksums so the launcher / users can verify a download.
          ( cd dist && sha256sum * > SHA256SUMS )
          ls -l dist

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v6
        with:
          name: reticle-dist
          path: dist/

      - name: Publish GitHub Release
        # Only attach to a Release when triggered by a tag push.
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/reticle-cli.zip
            dist/reticle-cli.tar
            dist/reticle-agent.aar
            dist/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true
