name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Unit tests
        run: ./gradlew :reticle-core:test :reticle-helper:test --stacktrace

      - name: Assemble all modules
        run: ./gradlew assemble --stacktrace

      - name: Build CLI distribution
        run: ./gradlew :reticle-helper:installDist --stacktrace

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: |
            reticle-core/build/reports/tests/
            reticle-helper/build/reports/tests/
          if-no-files-found: ignore

  plugin-validate:
    name: Validate plugin manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Lightweight, dependency-free check of the plugin/marketplace manifests:
      # well-formed JSON + required fields. The full `claude plugin validate`
      # is run locally before publishing; CI just guards against a broken
      # manifest (the most common cause of a plugin failing to install).
      - name: Validate plugin & marketplace manifests
        run: python3 scripts/validate_plugin.py

  macos-host:
    name: Build Swift host + native helper (macOS arm64)
    # The shipped distribution is macOS arm64 only (Swift host + native-image
    # helper). This job is the CI guard for those release-critical pieces, which
    # the ubuntu build can't exercise.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Set up GraalVM (JDK 21, native-image)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: "21"
          distribution: graalvm
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build the native helper
        run: ./gradlew :reticle-helper:nativeHelper --stacktrace

      - name: Build the Swift host
        run: swift build -c release --package-path reticle-host

      - name: Smoke-check the binaries (no device needed)
        run: |
          set -euo pipefail
          HOST=reticle-host/.build/release/ReticleHost
          HELPER=reticle-helper/build/native/reticle-helper
          test -x "$HOST" && test -x "$HELPER"
          # version needs no helper/device; proves the host binary runs.
          "$HOST" version
          # the native helper's RPC loop answers ping with no JDK.
          printf '{"id":1,"method":"ping","params":{}}\n' | "$HELPER" helper
