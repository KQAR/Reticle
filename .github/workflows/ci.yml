name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Unit tests
        run: ./gradlew :reticle-core:test :reticle-helper:test --stacktrace

      - name: Assemble all modules
        run: ./gradlew assemble --stacktrace

      - name: Build CLI distribution
        run: ./gradlew :reticle-helper:installDist --stacktrace

      # The injectable dex payload is the most build-environment-sensitive task
      # (needs d8 + the platform jar). It previously ran only at release time, so
      # a break surfaced only when tagging. Smoke it here.
      - name: Build injectable dex payload
        run: ./gradlew :reticle-agent:android:dexPayload --stacktrace

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: |
            reticle-core/build/reports/tests/
            reticle-helper/build/reports/tests/
          if-no-files-found: ignore

  plugin-validate:
    name: Validate plugin manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Lightweight, dependency-free check of the plugin/marketplace manifests:
      # well-formed JSON + required fields. The full `claude plugin validate`
      # is run locally before publishing; CI just guards against a broken
      # manifest (the most common cause of a plugin failing to install).
      - name: Validate plugin & marketplace manifests
        run: python3 scripts/validate_plugin.py

  macos-host:
    name: Build Swift host + native helper (macOS arm64)
    # The shipped distribution is macOS arm64 only (Swift host + native-image
    # helper). This job is the CI guard for those release-critical pieces, which
    # the ubuntu build can't exercise.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      # Hummingbird 2.25.0 requires Swift tools 6.1; macOS 15 includes Xcode 16.4.
      - name: Select Xcode 16.4 (Swift 6.1)
        run: |
          set -euo pipefail
          xc="/Applications/Xcode_16.4.app"
          [ -d "$xc" ] || { echo "Xcode 16.4 not found on runner"; ls -d /Applications/Xcode*.app; exit 1; }
          echo "selecting $xc"; sudo xcode-select -s "$xc"; swift --version

      - name: Set up GraalVM (JDK 21, native-image)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: "21"
          distribution: graalvm
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      # This runner bills at 10x; without this cache every push recompiles the
      # full swift-nio/hummingbird dependency graph from scratch.
      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: reticle-host/.build
          key: swiftpm-${{ runner.os }}-xcode16.4-${{ hashFiles('reticle-host/Package.resolved') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-xcode16.4-

      - name: Build the native helper
        run: ./gradlew :reticle-helper:nativeHelper --stacktrace

      # The Swift host is the user-facing CLI and the sole producer of the
      # event stream; its test suite must gate merges, not just compile.
      #
      # Retry up to 3 times: the Hummingbird `serve` tests start the server on a
      # Swift-concurrency Task while start() blocks on a semaphore. If a runner's
      # cooperative pool happens to be width-1, that blocking wait starves the
      # server Task and the socket never binds — a per-runner flake (production
      # is unaffected: `serve` runs on the main thread with full cores). A clean
      # pass on any attempt means every test genuinely ran and passed.
      - name: Run Swift host tests
        run: |
          set -uo pipefail
          for attempt in 1 2 3; do
            echo "::group::swift test (attempt $attempt)"
            if swift test --package-path reticle-host; then echo "::endgroup::"; exit 0; fi
            echo "::endgroup::"
            echo "swift test attempt $attempt failed"
          done
          exit 1

      - name: Build the Swift host
        run: swift build -c release --package-path reticle-host

      - name: Smoke-check the binaries (no device needed)
        run: |
          set -euo pipefail
          HOST=reticle-host/.build/release/ReticleHost
          HELPER=reticle-helper/build/native/reticle-helper
          test -x "$HOST" && test -x "$HELPER"
          # version needs no helper/device; proves the host binary runs.
          "$HOST" version
          # the native helper's RPC loop answers ping with no JDK.
          printf '{"id":1,"method":"ping","params":{}}\n' | "$HELPER" helper | grep -q '"ok":true'
          # render decodes a full Snapshot through kotlinx-serialization — the
          # code path most likely to regress under native-image (enums, the
          # polymorphic MetadataValue). ping alone never touches deserialization.
          printf '{"id":2,"method":"render","params":{"view":"compact","snapshot":"reticle-protocol/fixtures/snapshot.golden.json"}}\n' \
            | "$HELPER" helper | grep -q '"ok":true'
