name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Unit tests
        run: ./gradlew :reticle-core:test --stacktrace

      - name: Assemble all modules
        run: ./gradlew assemble --stacktrace

      - name: Build CLI distribution
        run: ./gradlew :reticle-cli:installDist --stacktrace

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: reticle-core/build/reports/tests/
          if-no-files-found: ignore

  plugin-validate:
    name: Validate plugin manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Lightweight, dependency-free check of the plugin/marketplace manifests:
      # well-formed JSON + required fields. The full `claude plugin validate`
      # is run locally before publishing; CI just guards against a broken
      # manifest (the most common cause of a plugin failing to install).
      - name: Validate plugin & marketplace manifests
        run: python3 scripts/validate_plugin.py
